name: test

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_COLOR: 1

jobs:

  pre-commit:

    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v5

    - name: Set up uv
      uses: astral-sh/setup-uv@v6
      with:
        version: 0.8.21
        python-version: 3.13
        activate-environment: true

    - name: Install aiida-project as an app
      run: uv tool install .

    - name: Create a test project
      run: aiida-project create testproject
